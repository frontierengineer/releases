# Frontier — official Docker Compose install.
#
#   curl -fsSL https://frontierengineer.github.io/releases/install/docker-compose.yml -o docker-compose.yml
#   docker compose up -d
#   open http://localhost:61815
#
# Edit the `/path/to/…` and `~/…` mounts below before the first run.
#
# First run: agents execute through the Claude CLI inside the container —
# authenticate it once (stored in the mounted home directory):
#   docker compose exec -it frontier claude
# …and follow the login flow.
#
# Updating (the in-app notice tells you when a new build is published):
#   docker compose pull && docker compose up -d
#
# Channels: stable (default) | rc (early access) | nightly (head, may break).
# Keep the image tag and FRONTIER_CHANNEL in step.

services:
  frontier:
    image: ghcr.io/frontierengineer/frontier:stable
    container_name: frontier
    restart: unless-stopped
    ports:
      - "61815:80" # the UI
      # - "27520:27520" # worker port — only needed to connect additional machines
    environment:
      FRONTIER_DIR: /data/frontier
      FRONTIER_CHANNEL: stable
    # Optional: NVIDIA GPU acceleration for voice and transcription.
    # Everything runs on CPU without it.
    # gpus: all
    volumes:
      # Replace /path/to/frontier-data with the directory where you want all
      # of Frontier's data to live. Without this mount, Frontier boots in
      # ephemeral demo mode.
      - /path/to/frontier-data:/data/frontier
      # Replace /path/to/frontier-home with a directory for the container's
      # home — keeping it means logins and caches survive recreations.
      - /path/to/frontier-home:/root
      # Makes your local directories available to work on in Frontier —
      # mount as many as you like; each shows up as a place to create
      # workspaces.
      - ~/repos:/workspace/repos
      - ~/notes:/workspace/notes
